spring:
  application:
    name: football-verse-api
  cache:
    type: simple
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:55432/football_verse}
    username: ${DB_USERNAME:football_verse}
    password: ${DB_PASSWORD:football_verse}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:127.0.0.1}
      port: ${SPRING_REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    ignore-migration-patterns: "*:missing,*:future"

app:
  internal:
    token: ${INTERNAL_TOKEN:dev-internal-token}
  gateway:
    url: ${APP_GATEWAY_URL:http://localhost:8000}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    admin-email: ${APP_ADMIN_EMAIL:admin@footballverse.local}
    admin-password: ${APP_ADMIN_PASSWORD:ChangeMe123!}
    moderator-email: ${APP_MODERATOR_EMAIL:moderator@footballverse.local}
    moderator-password: ${APP_MODERATOR_PASSWORD:ChangeMe123!}
    news-categories: ${APP_SEED_NEWS_CATEGORIES:League News=league-tournament-news;Match Analysis=match-preview-analysis;Transfers=transfer-news;Off the Pitch=off-the-pitch;Opinions=expert-fan-opinions;Football Facts=football-facts-tactical-insights;Others=others}
    forum-categories: ${APP_SEED_FORUM_CATEGORIES:League News=league-tournament-news;Match Analysis=match-preview-analysis;Transfers=transfer-news;Off the Pitch=off-the-pitch;Opinions=expert-fan-opinions;Football Facts=football-facts-tactical-insights;Others=others}
    news-sources: ${APP_SEED_NEWS_SOURCES:ESPN Soccer=https://www.espn.com/espn/rss/soccer/news;BBC Sport Football=https://feeds.bbci.co.uk/sport/football/rss.xml;Goal.com=https://www.goal.com/feeds/en/news;Transfermarkt=https://www.transfermarkt.co.uk/rss/news;Tribuna.com=https://tribuna.com/rss/news}
  crawl:
    startup-enabled: ${APP_CRAWL_STARTUP_ENABLED:false}
    cron: ${APP_CRAWL_CRON:-}
    http:
      connect-timeout-ms: ${APP_CRAWL_HTTP_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${APP_CRAWL_HTTP_READ_TIMEOUT_MS:15000}
      user-agent: ${APP_CRAWL_HTTP_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36}
      retry-max: ${APP_CRAWL_HTTP_RETRY_MAX:2}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  match-engine:
    url: ${MATCH_ENGINE_URL:http://127.0.0.1:8090}
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}

server:
  servlet:
    context-path: /api/v1
