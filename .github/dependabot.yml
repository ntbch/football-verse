version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule: { interval: weekly }
  - package-ecosystem: npm
    directory: /services/gateway
    schedule: { interval: weekly }
  - package-ecosystem: maven
    directory: /services/core-api
    schedule: { interval: weekly }
  - package-ecosystem: maven
    directory: /services/career
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /services/prediction
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /services/match-engine
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directories:
      - /
      - /apps/web
      - /services/core-api
      - /services/gateway
      - /services/prediction
      - /services/career
      - /services/match-engine
    schedule: { interval: weekly }
