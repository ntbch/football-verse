name: Verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Reject newly introduced vulnerable dependencies
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            services/gateway/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/prediction/requirements*.txt
            services/match-engine/requirements*.txt

      - name: Install locked Node dependencies
        shell: pwsh
        run: |
          npm --prefix apps/web ci
          npm --prefix services/gateway ci

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install -r services/prediction/requirements-dev.txt
          python -m pip install -r services/match-engine/requirements.txt pytest

      - name: Run the repository verification gate
        shell: pwsh
        run: ./scripts/verify.ps1 -Python python
