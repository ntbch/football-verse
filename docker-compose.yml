services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: football_verse
      POSTGRES_USER: football_verse
      POSTGRES_PASSWORD: football_verse
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  match-engine:
    build: ./match-engine
    environment:
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      FOOTBALL_PROVIDER: ${FOOTBALL_PROVIDER:-football-data}
      FOOTBALL_SEASON: ${FOOTBALL_SEASON:-2026}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "8090:8090"

volumes:
  postgres_data:
