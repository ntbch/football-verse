services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: football_verse
      POSTGRES_USER: football_verse
      POSTGRES_PASSWORD: football_verse
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prediction-service:
    build: ./prediction-service
    environment:
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      FOOTBALL_PROVIDER: ${FOOTBALL_PROVIDER:-football-data}
      FOOTBALL_SEASON: ${FOOTBALL_SEASON:-2026}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine

  core-service:
    build: ./core-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/football_verse
      - DB_USERNAME=football_verse
      - DB_PASSWORD=football_verse
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - PREDICTION_SERVICE_URL=http://prediction-service:8090
      - APP_GATEWAY_URL=http://gateway-service:8000
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-dev-internal-token}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      - postgres
      - redis

  gateway-service:
    build: ./gateway-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - BACKEND_URL=http://core-service:8080
      - PREDICTION_SERVICE_URL=http://prediction-service:8090
      - REDIS_URL=redis://redis:6379
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-dev-internal-token}
      - RUN_CRAWL_ON_STARTUP=${RUN_CRAWL_ON_STARTUP:-true}
    depends_on:
      - redis
      - prediction-service
      - core-service

  web-client:
    build:
      context: ./web-client
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - gateway-service

volumes:
  postgres_data:
